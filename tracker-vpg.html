<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPG Stats Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══ VARIABLES ═══ */
:root {
  --bg: #080c14;
  --card: #0d1220;
  --card2: #111827;
  --border: #1a2035;
  --border2: #222840;
  --text: #e8eaf6;
  --muted: #5a6080;
  --muted2: #3a4060;
  --accent: #00e5ff;
  --accent2: #0099bb;
  --green: #00e564;
  --red: #ff3250;
  --gold: #d4aa3c;
  --s1: #00e5ff; --s2: #00e564; --s3: #d4aa3c;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Barlow', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,229,255,0.012) 2px, rgba(0,229,255,0.012) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,229,255,0.008) 2px, rgba(0,229,255,0.008) 4px);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  top: -30%;
  left: 50%;
  transform: translateX(-50%);
  width: 800px;
  height: 400px;
  background: radial-gradient(ellipse, rgba(0,229,255,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ═══ LAYOUT ═══ */
#app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 16px 40px; }

/* ═══ SEARCH SCREEN ═══ */
#searchScreen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  padding: 40px 16px;
}
.search-logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.search-logo-img {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  filter: drop-shadow(0 0 20px rgba(0,229,255,0.3));
}
.search-logo-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 2rem;
  letter-spacing: .15em;
  color: var(--accent);
}
.search-logo-sub {
  font-size: .8rem;
  color: var(--muted);
  letter-spacing: .1em;
  text-transform: uppercase;
}

.search-box {
  width: 100%;
  max-width: 520px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.search-box label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: .85rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
}
.search-input-wrap {
  display: flex;
  gap: 8px;
}
.search-input {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 12px 16px;
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: 1rem;
  outline: none;
  transition: border-color .15s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--muted); }

.btn {
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 10px;
  padding: 12px 20px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: .95rem;
  letter-spacing: .06em;
  cursor: pointer;
  transition: background .15s, transform .1s;
  white-space: nowrap;
}
.btn:hover { background: #00ccee; }
.btn:active { transform: scale(.97); }
.btn.secondary {
  background: var(--card2);
  color: var(--text);
  border: 1px solid var(--border2);
}
.btn.secondary:hover { background: var(--border2); }
.btn.danger { background: var(--red); color: #fff; }

.search-results {
  width: 100%;
  max-width: 520px;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 10px;
  overflow: hidden;
  display: none;
}
.search-result-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background .12s;
}
.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: var(--card2); }
.sri-logo {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  object-fit: cover;
  background: var(--border2);
  flex-shrink: 0;
}
.sri-name { font-weight: 700; font-size: .95rem; }
.sri-league { font-size: .75rem; color: var(--muted); margin-top: 2px; }

.search-error {
  color: var(--red);
  font-size: .85rem;
  text-align: center;
  display: none;
}
.search-loading {
  color: var(--muted);
  font-size: .85rem;
  text-align: center;
  display: none;
}

/* Recent teams */
.recent-teams {
  width: 100%;
  max-width: 520px;
  display: none;
  flex-direction: column;
  gap: 8px;
}
.recent-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: .75rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
}
.recent-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.recent-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 5px 12px 5px 6px;
  cursor: pointer;
  font-size: .82rem;
  font-weight: 600;
  transition: border-color .12s;
}
.recent-chip:hover { border-color: var(--accent); }
.recent-chip img { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }

/* ═══ TRACKER SCREEN ═══ */
#trackerScreen { display: none; }

/* Header */
.header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 20px 0 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0;
  position: sticky;
  top: 0;
  background: rgba(8,12,20,0.95);
  backdrop-filter: blur(8px);
  z-index: 100;
}
.team-logo {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--border2);
  flex-shrink: 0;
}
.team-info { flex: 1; min-width: 0; }
.team-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 1.4rem;
  letter-spacing: .08em;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.team-meta { font-size: .75rem; color: var(--muted); margin-top: 3px; }
.header-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

.stat-pill {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 4px 12px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: .8rem;
  font-weight: 700;
  letter-spacing: .04em;
  color: var(--muted);
}
.stat-pill span { color: var(--text); }

/* Tabs */
.tabs {
  display: flex;
  gap: 2px;
  padding: 10px 0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  position: sticky;
  top: 86px;
  background: rgba(8,12,20,0.95);
  backdrop-filter: blur(8px);
  z-index: 99;
  border-bottom: 1px solid var(--border);
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  background: transparent;
  border: 1px solid transparent;
  border-radius: 8px;
  padding: 7px 14px;
  color: var(--muted);
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: .82rem;
  letter-spacing: .06em;
  text-transform: uppercase;
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
}
.tab-btn:hover { color: var(--text); background: var(--card); }
.tab-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(0,229,255,0.07); }

/* Tab content */
.tab-content { padding-top: 20px; display: none; }
.tab-content.active { display: block; }

/* ═══ CLASSEMENT TABLE ═══ */
.section-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 1rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}

.table-wrap { overflow-x: auto; }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: .85rem;
}
thead th {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: .72rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 8px 10px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}
thead th:hover { color: var(--text); }
thead th.sorted { color: var(--accent); }
tbody tr {
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .12s;
}
tbody tr:hover { background: var(--card); }
tbody td {
  padding: 10px 10px;
  white-space: nowrap;
}
.rank-cell {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 1.1rem;
  color: var(--muted2);
  width: 32px;
}
.rank-cell.top1 { color: var(--gold); }
.rank-cell.top2 { color: #aaa; }
.rank-cell.top3 { color: #cd7f32; }

.player-cell { display: flex; align-items: center; gap: 10px; }
.avatar {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: .75rem;
  flex-shrink: 0;
  overflow: hidden;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
.player-name { font-weight: 700; font-size: .9rem; }
.player-pos {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: .68rem;
  padding: 2px 5px;
  border-radius: 4px;
  border: 1px solid currentColor;
}
.rating-badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 6px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: .9rem;
  color: #000;
}
.trend-up { color: var(--green); font-size: .9rem; }
.trend-down { color: var(--red); font-size: .9rem; }
.trend-neutral { color: var(--muted); font-size: .9rem; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.trend-alert { animation: blink 1s infinite; }

/* ═══ FILTER BAR ═══ */
.filter-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.filter-select {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 6px 10px;
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: .82rem;
  outline: none;
  cursor: pointer;
}
.filter-select:focus { border-color: var(--accent); }

/* ═══ CLUB BAR ═══ */
.club-bar {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  margin-bottom: 16px;
}
.cb-stat { display: flex; flex-direction: column; gap: 2px; }
.cb-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 1.3rem;
}
.cb-label { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }

/* ═══ MATCHES TAB ═══ */
.match-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--border2);
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: background .12s;
  display: flex;
  align-items: center;
  gap: 14px;
}
.match-card:hover { background: var(--card2); }
.match-card.W { border-left-color: var(--green); }
.match-card.D { border-left-color: var(--gold); }
.match-card.L { border-left-color: var(--red); }
.mc-score {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 1.8rem;
  min-width: 56px;
  line-height: 1;
}
.mc-score.W { color: var(--green); }
.mc-score.D { color: var(--gold); }
.mc-score.L { color: var(--red); }
.mc-info { flex: 1; min-width: 0; }
.mc-opp { font-weight: 700; font-size: .9rem; }
.mc-meta { font-size: .72rem; color: var(--muted); margin-top: 2px; }
.mc-rating {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 1.3rem;
  color: var(--gold);
  text-align: center;
}
.mc-rating small { display: block; font-size: .6rem; color: var(--muted); font-weight: 400; }

/* ═══ MATCH DETAIL MODAL ═══ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 14px;
  width: min(700px, 96vw);
  max-height: 90vh;
  overflow-y: auto;
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--card);
  z-index: 10;
}
.modal-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 1.2rem;
  letter-spacing: .06em;
}
.close-btn {
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--muted);
  font-size: 1.1rem;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: color .12s;
}
.close-btn:hover { color: var(--text); }
.modal-body { padding: 20px 22px; }

/* Match detail player rows */
.md-player-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.md-player-row:last-child { border-bottom: none; }
.md-username { flex: 1; font-weight: 700; font-size: .88rem; }
.md-pos {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: .7rem;
  min-width: 36px;
}
.md-stat { font-size: .8rem; color: var(--muted); min-width: 28px; text-align: center; }
.md-stat span { color: var(--text); font-weight: 700; }
.md-rating {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 1rem;
  padding: 3px 8px;
  border-radius: 6px;
  color: #000;
  min-width: 44px;
  text-align: center;
}

/* ═══ LOADING ═══ */
.loading-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 300px;
  gap: 16px;
  color: var(--muted);
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ═══ TOAST ═══ */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 10px 20px;
  font-size: .875rem;
  font-weight: 600;
  z-index: 9999;
  transition: transform .3s ease;
  white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }
#toast.success { border-color: var(--green); color: var(--green); }
#toast.error { border-color: var(--red); color: var(--red); }

/* ═══ EMPTY STATE ═══ */
.empty {
  text-align: center;
  color: var(--muted);
  padding: 40px;
  font-size: .9rem;
}

/* ═══ PLAYER MODAL ═══ */
.pm-tabs {
  display: flex;
  gap: 4px;
  padding: 12px 22px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}
.pm-tabs::-webkit-scrollbar { display: none; }
.pm-tab {
  background: transparent;
  border: 1px solid transparent;
  border-radius: 6px;
  padding: 5px 12px;
  color: var(--muted);
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: .78rem;
  letter-spacing: .05em;
  text-transform: uppercase;
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
}
.pm-tab:hover { color: var(--text); }
.pm-tab.active { color: var(--accent); border-color: var(--accent); background: rgba(0,229,255,.07); }
.pm-panel { display: none; padding: 16px 22px; }
.pm-panel.active { display: block; }

/* Stats blocks */
.stat-blocks { display: flex; flex-wrap: wrap; gap: 8px; }
.sb {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  min-width: 70px;
  text-align: center;
}
.sb-v { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.3rem; }
.sb-l { font-size: .65rem; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .04em; }

/* Match list in player modal */
.match-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-size: .8rem;
}
.match-item:last-child { border-bottom: none; }
.mi-res {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: .72rem;
  width: 18px;
  text-align: center;
}
.mi-res.W { color: var(--green); }
.mi-res.D { color: var(--gold); }
.mi-res.L { color: var(--red); }

/* Spider chart */
#spiderCanvas { display: block; margin: 0 auto; }

/* ═══ RESPONSIVE ═══ */
@media (max-width: 768px) {
  .header { padding: 14px 0 12px; }
  .team-name { font-size: 1.1rem; }
  tbody td { padding: 8px 6px; }
  .modal { border-radius: 14px 14px 0 0; }
}
</style>
</head>
<body>
<div id="app">

  <!-- SEARCH SCREEN -->
  <div id="searchScreen">
    <div class="search-logo">
      <div class="search-logo-title">⚽ VPG STATS</div>
      <div class="search-logo-sub">Tracker multi-équipes</div>
    </div>

    <div class="search-box">
      <label>Rechercher une équipe VPG</label>
      <div class="search-input-wrap">
        <input type="text" class="search-input" id="teamSearchInput" placeholder="Ex: Masta Luz, PSG, ..." autocomplete="off">
        <button class="btn" onclick="searchTeam()">🔍</button>
      </div>
      <div class="search-loading" id="searchLoading">Recherche en cours...</div>
      <div class="search-error" id="searchError"></div>
      <div class="search-results" id="searchResults"></div>
    </div>

    <div class="recent-teams" id="recentTeams">
      <div class="recent-label">Récemment consultées</div>
      <div class="recent-list" id="recentList"></div>
    </div>
  </div>

  <!-- TRACKER SCREEN -->
  <div id="trackerScreen">
    <div class="header">
      <img id="headerLogo" class="team-logo" src="" alt="">
      <div class="team-info">
        <div class="team-name" id="headerName">—</div>
        <div class="team-meta" id="headerMeta">—</div>
      </div>
      <div class="header-actions">
        <div class="stat-pill" id="headerRecord">—</div>
        <button class="btn secondary" onclick="backToSearch()" title="Changer d'équipe">↩</button>
      </div>
    </div>

    <div class="tabs" id="mainTabs">
      <button class="tab-btn active" id="tab-classement" onclick="switchTab('classement')">🏆 Classement</button>
      <button class="tab-btn" id="tab-matches" onclick="switchTab('matches')">⚽ Matchs</button>
      <button class="tab-btn" id="tab-calendar" onclick="switchTab('calendar')">📅 Calendrier</button>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar" id="filterBar">
      <select class="filter-select" id="seasonFilter" onchange="applyFilters()">
        <option value="">Toutes saisons</option>
      </select>
      <select class="filter-select" id="compFilter" onchange="applyFilters()">
        <option value="">Toutes compétitions</option>
      </select>
      <select class="filter-select" id="posFilter" onchange="applyFilters()">
        <option value="">Tous postes</option>
        <option value="GK">GK</option>
        <option value="DEF">Défenseurs</option>
        <option value="MIL">Milieux</option>
        <option value="ATT">Attaquants</option>
      </select>
    </div>

    <!-- Club bar -->
    <div class="club-bar" id="clubBar"></div>

    <!-- Loading -->
    <div class="loading-screen" id="loadingScreen">
      <div class="spinner"></div>
      <div>Chargement des données VPG...</div>
    </div>

    <!-- Tab: Classement -->
    <div class="tab-content active" id="tab-classement-content">
      <div class="table-wrap">
        <table id="rankTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Joueur</th>
              <th onclick="sortBy('mainPos')">Poste</th>
              <th onclick="sortBy('games')">MJ</th>
              <th onclick="sortBy('avgRating')" class="sorted">Note ↓</th>
              <th onclick="sortBy('goals')">Buts</th>
              <th onclick="sortBy('assists')">PD</th>
              <th onclick="sortBy('ga')">G+A</th>
              <th onclick="sortBy('tackles')">Tac.</th>
              <th onclick="sortBy('saves')">Arr.</th>
              <th>Forme</th>
              <th>Tend.</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Tab: Matches -->
    <div class="tab-content" id="tab-matches-content">
      <div id="matchesList"></div>
    </div>

    <!-- Tab: Calendar -->
    <div class="tab-content" id="tab-calendar-content">
      <div id="calendarContent"></div>
    </div>
  </div>
</div>

<!-- Match Detail Modal -->
<div class="modal-overlay" id="matchModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="matchModalTitle">Détail du match</div>
      <button class="close-btn" onclick="closeMatchModal()">✕</button>
    </div>
    <div class="modal-body" id="matchModalBody"></div>
  </div>
</div>

<!-- Player Modal -->
<div class="modal-overlay" id="playerModal">
  <div class="modal" id="playerModalInner">
    <div class="modal-header">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="avatar" id="pmAvatar" style="width:40px;height:40px;border-radius:10px"></div>
        <div>
          <div class="modal-title" id="pmName">—</div>
          <div style="font-size:.72rem;color:var(--muted)" id="pmMeta">—</div>
        </div>
      </div>
      <button class="close-btn" onclick="closePlayerModal()">✕</button>
    </div>
    <div class="pm-tabs" id="pmTabs"></div>
    <div id="pmPanels"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const VPG_API = 'https://api.virtualprogaming.com/public';
const LOGO_BASE = 'https://imagedelivery.net/gNtO76PZgJnNPJarDZ9kSw';

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let currentTeam = null;   // { id, name, slug, logo, league }
let allMatches = [];      // raw match objects from VPG
let allMatchData = {};    // match_id → players array
let players = [];         // built player objects
let filteredPlayers = []; // after filters
let currentTab = 'classement';
let sortKey = 'avgRating';
let sortDir = -1;
let seasons = [];
let leagues = [];

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function logoUrl(key) {
  if (!key) return '';
  return `${LOGO_BASE}/${key}/public`;
}

function posGroup(pos) {
  if (!pos) return 'MIL';
  const p = pos.toUpperCase();
  if (p === 'GK') return 'GK';
  if (['CB','LB','RB','LWB','RWB','SW'].includes(p)) return 'DEF';
  if (['ST','CF','LW','RW','SS'].includes(p)) return 'ATT';
  return 'MIL';
}

function posColor(pos) {
  const g = posGroup(pos);
  if (g === 'GK') return '#d4aa3c';
  if (g === 'DEF') return '#00e5ff';
  if (g === 'ATT') return '#ff6b35';
  return '#00e564';
}

function ratingColor(r) {
  const n = parseFloat(r);
  if (n >= 8.5) return '#00e564';
  if (n >= 7.5) return '#7bc67e';
  if (n >= 6.5) return '#d4aa3c';
  if (n >= 5.5) return '#ff9800';
  return '#ff3250';
}

function resultOf(match, teamId) {
  const isHome = match.home_team_id === teamId;
  const gs = isHome ? match.home_score : match.away_score;
  const ga = isHome ? match.away_score : match.home_score;
  if (gs > ga) return 'W';
  if (gs < ga) return 'L';
  return 'D';
}

function scoreStr(match, teamId) {
  const isHome = match.home_team_id === teamId;
  const gs = isHome ? match.home_score : match.away_score;
  const ga = isHome ? match.away_score : match.home_score;
  return `${gs}-${ga}`;
}

function oppName(match, teamId) {
  return match.home_team_id === teamId ? match.away_name : match.home_name;
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = type ? `show ${type}` : 'show';
  setTimeout(() => t.className = '', 3000);
}

function showLoading(v) {
  document.getElementById('loadingScreen').style.display = v ? 'flex' : 'none';
}

// ═══════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════
document.getElementById('teamSearchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchTeam();
});
document.getElementById('teamSearchInput').addEventListener('input', () => {
  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('searchError').style.display = 'none';
});

async function searchTeam() {
  const q = document.getElementById('teamSearchInput').value.trim();
  if (!q) return;

  const loading = document.getElementById('searchLoading');
  const error = document.getElementById('searchError');
  const results = document.getElementById('searchResults');

  loading.style.display = 'block';
  error.style.display = 'none';
  results.style.display = 'none';

  try {
    const found = await findTeamBySlug(q);
    loading.style.display = 'none';

    if (!found.length) {
      error.textContent = 'Équipe introuvable. Essayez le slug exact (ex: MASTALUZ).';
      error.style.display = 'block';
      return;
    }

    results.innerHTML = found.map(t => `
      <div class="search-result-item" onclick="selectTeam(${JSON.stringify(t).replace(/"/g,'&quot;')})">
        <img class="sri-logo" src="${logoUrl(t.logo)}" onerror="this.style.display='none'">
        <div>
          <div class="sri-name">${t.name}</div>
          <div class="sri-league">${t.leagues.map(l=>l.name).join(' · ')}</div>
        </div>
      </div>
    `).join('');
    results.style.display = 'block';

  } catch(e) {
    loading.style.display = 'none';
    error.textContent = "Erreur de connexion à l'API VPG.";
    error.style.display = 'block';
    console.error(e);
  }
}

async function findTeamBySlug(query) {
  const q = query.trim().toLowerCase();

  // Step 1: Try direct slug lookup first (fastest)
  const slugVariants = [
    query.toUpperCase().replace(/\s+/g, ''),
    query.toUpperCase().replace(/\s+/g, '-'),
    query.toUpperCase(),
    query.replace(/\s+/g, ''),
  ];

  for (const slug of [...new Set(slugVariants)]) {
    try {
      const res = await fetch(`${VPG_API}/teams/${encodeURIComponent(slug)}/leagues/`);
      if (!res.ok) continue;
      const leagues = await res.json();
      if (!Array.isArray(leagues) || !leagues.length) continue;

      let logo = null, name = query;
      try {
        const tr = await fetch(`${VPG_API}/teams/${encodeURIComponent(slug)}/`);
        if (tr.ok) { const td = await tr.json(); logo = td.logo||null; name = td.name||query; }
      } catch(e) {}

      return [{ slug, name: name.trim(), logo, leagues, league: leagues[0]?.slug||leagues[0]?.name }];
    } catch(e) {}
  }

  // Step 2: Fetch all leagues from VPG community, then search matches
  const teamsFound = new Map();
  try {
    // Get all leagues
    const lRes = await fetch(`${VPG_API}/communities/VPGFRANCE/leagues/?limit=100&offset=0`);
    const lData = lRes.ok ? await lRes.json() : { data: [] };
    const allLeagues = lData.data || [];

    // Search matches in all leagues in parallel (just last 50 matches each)
    await Promise.all(allLeagues.map(async league => {
      try {
        const slug = league.slug;
        const res = await fetch(`${VPG_API}/leagues/${encodeURIComponent(slug)}/matches/?status=complete&limit=50`);
        if (!res.ok) return;
        const data = await res.json();
        (data.data || []).forEach(m => {
          if (m.home_name && m.home_name.trim().toLowerCase().includes(q)) {
            const key = m.home_name.trim();
            if (!teamsFound.has(key)) teamsFound.set(key, { name: key, logo: m.home_logo, leagueSlug: slug, leagueName: league.name });
          }
          if (m.away_name && m.away_name.trim().toLowerCase().includes(q)) {
            const key = m.away_name.trim();
            if (!teamsFound.has(key)) teamsFound.set(key, { name: key, logo: m.away_logo, leagueSlug: slug, leagueName: league.name });
          }
        });
      } catch(e) {}
    }));
  } catch(e) {}

  if (!teamsFound.size) return [];

  // Build results
  return [...teamsFound.values()].map(t => ({
    slug: t.name.toUpperCase().replace(/\s+/g,''),
    name: t.name,
    logo: t.logo,
    leagues: [{ name: t.leagueName, slug: t.leagueSlug }],
    league: t.leagueSlug,
  }));
}


// ═══════════════════════════════════════════
async function selectTeam(team) {
  document.getElementById('searchScreen').style.display = 'none';
  document.getElementById('trackerScreen').style.display = 'block';

  // Save to recent
  saveRecent(team);

  currentTeam = team;
  allMatches = [];
  allMatchData = {};

  // Update header basics
  document.getElementById('headerName').textContent = team.name;
  const leagueNames = team.leagues ? team.leagues.map(l=>l.name).join(' · ') : team.league;
  document.getElementById('headerMeta').textContent = leagueNames;
  if (team.logo) {
    document.getElementById('headerLogo').src = logoUrl(team.logo);
  }

  // Reset filters
  document.getElementById('seasonFilter').innerHTML = '<option value="">Toutes saisons</option>';
  document.getElementById('compFilter').innerHTML = '<option value="">Toutes compétitions</option>';

  showLoading(true);
  document.getElementById('tableBody').innerHTML = '';
  document.getElementById('clubBar').innerHTML = '';

  try {
    await loadTeamData(team);
  } catch(e) {
    showLoading(false);
    showToast('Erreur lors du chargement', 'error');
    console.error(e);
  }
}

async function loadTeamData(team) {
  showLoading(true);

  // 1. Fetch all matches from all team leagues
  const teamLeagues = team.leagues ? team.leagues.map(l => l.slug || l.name) : [team.league];
  const leagueArrays = await Promise.all(teamLeagues.map(l => fetchAllLeagueMatches(l)));
  const leagueMatches = leagueArrays.flat();

  // 2. Filter matches for this team (match by name since we don't have team_id yet)
  const teamName = team.name.trim().toLowerCase();
  const myMatches = leagueMatches.filter(m =>
    m.home_name.trim().toLowerCase() === teamName ||
    m.away_name.trim().toLowerCase() === teamName
  );

  if (!myMatches.length) {
    showLoading(false);
    showToast('Aucun match trouvé pour cette équipe', 'error');
    return;
  }

  // 3. Get team_id from first match data
  const firstMatchId = myMatches[0].id;
  const firstData = await fetchMatchData(firstMatchId);
  const myPlayer = firstData.find(p =>
    p.team_name.trim().toLowerCase() === teamName
  );
  const teamId = myPlayer ? myPlayer.team_id : null;

  currentTeam = { ...team, id: teamId };

  // Tag matches with home/away team_id
  allMatches = myMatches.map(m => ({
    ...m,
    home_team_id: m.home_name.trim().toLowerCase() === teamName ? teamId : null,
    away_team_id: m.away_name.trim().toLowerCase() === teamName ? teamId : null,
    myTeamId: teamId,
    result: resultOf({ ...m, home_team_id: teamId }, teamId),
    score: scoreStr({ ...m, home_team_id: teamId }, teamId),
    opp: oppName({ ...m, home_team_id: teamId }, teamId),
  }));

  // Store first match data
  allMatchData[firstMatchId] = firstData;

  // 4. Fetch all other match data in parallel (batched)
  const remaining = myMatches.slice(1).map(m => m.id);
  await fetchMatchDataBatch(remaining);

  // 5. Build players
  buildPlayers();

  // 6. Build seasons & leagues for filters
  buildFilters();

  // 7. Render
  showLoading(false);
  renderAll();

  // Update header
  const wins = allMatches.filter(m => m.result === 'W').length;
  const draws = allMatches.filter(m => m.result === 'D').length;
  const losses = allMatches.filter(m => m.result === 'L').length;
  document.getElementById('headerRecord').innerHTML = `<span style="color:var(--green)">${wins}V</span> <span style="color:var(--gold)">${draws}N</span> <span style="color:var(--red)">${losses}D</span>`;
  document.getElementById('headerMeta').textContent = `${team.league} · ${allMatches.length} matchs`;
}

async function fetchAllLeagueMatches(league) {
  const matches = [];
  let offset = 0;
  const limit = 100;

  while (true) {
    const res = await fetch(`${VPG_API}/leagues/${league}/matches/?status=complete&limit=${limit}&offset=${offset}`);
    if (!res.ok) break;
    const data = await res.json();
    matches.push(...(data.data || []));
    if (matches.length >= data.count || (data.data || []).length < limit) break;
    offset += limit;
    if (offset > 2000) break; // safety
  }
  return matches;
}

async function fetchMatchData(matchId) {
  if (allMatchData[matchId]) return allMatchData[matchId];
  try {
    const res = await fetch(`${VPG_API}/matches/${matchId}/data/`);
    if (!res.ok) return [];
    const data = await res.json();
    allMatchData[matchId] = data;
    return data;
  } catch(e) { return []; }
}

async function fetchMatchDataBatch(matchIds) {
  // Fetch in batches of 10 parallel
  const batchSize = 10;
  for (let i = 0; i < matchIds.length; i += batchSize) {
    const batch = matchIds.slice(i, i + batchSize);
    await Promise.all(batch.map(id => fetchMatchData(id)));
  }
}

// ═══════════════════════════════════════════
// BUILD PLAYERS
// ═══════════════════════════════════════════
function buildPlayers() {
  const map = {};

  allMatches.forEach(m => {
    const mData = allMatchData[m.id] || [];
    const myPlayers = mData.filter(p => p.team_id === currentTeam.id);

    myPlayers.forEach(p => {
      const key = p.username;
      if (!map[key]) {
        map[key] = {
          username: p.username,
          avatar: p.avatar,
          mainPos: p.position,
          positions: {},
          games: 0, goals: 0, assists: 0, tackles: 0,
          saves: 0, shots: 0, passes: 0,
          ratings: [], wins: 0, draws: 0, losses: 0,
          mom: 0, recent: [],
        };
      }
      const pl = map[key];
      pl.games++;
      pl.goals += p.goals || 0;
      pl.assists += p.assists || 0;
      pl.tackles += (p.tackles_made || 0);
      pl.saves += p.saves || 0;
      pl.shots += p.shots || 0;
      pl.passes += p.passes_made || 0;
      if (p.match_rating > 0) pl.ratings.push(p.match_rating);
      pl.positions[p.position] = (pl.positions[p.position] || 0) + 1;

      // Result
      if (m.result === 'W') pl.wins++;
      else if (m.result === 'D') pl.draws++;
      else pl.losses++;

      // Recent (last 20)
      if (pl.recent.length < 20) {
        pl.recent.push({
          matchId: m.id,
          date: m.datetime,
          opp: m.opp,
          score: m.score,
          result: m.result,
          rating: p.match_rating,
          goals: p.goals || 0,
          assists: p.assists || 0,
          position: p.position,
        });
      }
    });
  });

  // Finalize
  players = Object.values(map).map(p => {
    const avgRating = p.ratings.length
      ? Math.round((p.ratings.reduce((s,r) => s+r, 0) / p.ratings.length) * 10) / 10
      : 0;
    // Main position = most played
    const mainPos = Object.entries(p.positions).sort((a,b) => b[1]-a[1])[0]?.[0] || '—';
    // Trend
    const last5 = p.ratings.slice(-5);
    const prev5 = p.ratings.slice(-10, -5);
    let trend = '→';
    if (last5.length >= 3 && prev5.length >= 3) {
      const a = last5.reduce((s,r)=>s+r,0)/last5.length;
      const b = prev5.reduce((s,r)=>s+r,0)/prev5.length;
      if (a - b > 0.3) trend = '↑';
      else if (b - a > 0.3) trend = '↓';
    }
    return {
      ...p,
      mainPos,
      avgRating,
      ga: p.goals + p.assists,
      trend,
    };
  });

  filteredPlayers = [...players];
}

// ═══════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════
function buildFilters() {
  // Seasons — from match dates
  const seasonSet = new Set();
  allMatches.forEach(m => {
    if (m.datetime) {
      const y = new Date(m.datetime).getFullYear();
      seasonSet.add(y);
    }
  });
  const seasonSel = document.getElementById('seasonFilter');
  seasonSel.innerHTML = '<option value="">Toutes saisons</option>';
  [...seasonSet].sort((a,b) => b-a).forEach(y => {
    seasonSel.innerHTML += `<option value="${y}">${y}</option>`;
  });

  // Competitions — from league name + match data
  const compSel = document.getElementById('compFilter');
  compSel.innerHTML = '<option value="">Toutes compétitions</option>';
  const liParts = currentTeam.league.split('-');
  compSel.innerHTML += `<option value="league">${currentTeam.league}</option>`;
}

function applyFilters() {
  buildPlayers();
  renderRankTable();
  renderClubBar();
}

// ═══════════════════════════════════════════
// RENDER ALL
// ═══════════════════════════════════════════
function renderAll() {
  renderRankTable();
  renderClubBar();
  if (currentTab === 'matches') renderMatches();
  if (currentTab === 'calendar') renderCalendar();
}

// ═══════════════════════════════════════════
// RANK TABLE
// ═══════════════════════════════════════════
function sortBy(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = -1; }
  renderRankTable();
}

function renderRankTable() {
  const sorted = [...filteredPlayers].sort((a,b) => {
    const av = a[sortKey] ?? 0;
    const bv = b[sortKey] ?? 0;
    return sortDir * (bv > av ? 1 : bv < av ? -1 : 0);
  });

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  sorted.forEach((p, i) => {
    const rank = i + 1;
    const rc = ratingColor(p.avgRating);
    const pc = posColor(p.mainPos);
    const rankClass = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : '';
    const trendClass = p.trend === '↑' ? 'trend-up' : p.trend === '↓' ? 'trend-down' : 'trend-neutral';
    const formHtml = p.recent.slice(0,5).map(m =>
      `<span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:${m.result==='W'?'var(--green)':m.result==='D'?'var(--gold)':'var(--red)'};font-size:.5rem;line-height:14px;text-align:center;color:#000;font-weight:900">${m.result}</span>`
    ).join('');

    const tr = document.createElement('tr');
    tr.onclick = () => openPlayerModal(p);
    tr.innerHTML = `
      <td class="rank-cell ${rankClass}">${rank}</td>
      <td>
        <div class="player-cell">
          <div class="avatar" style="background:${pc}22">
            ${p.avatar ? `<img src="${logoUrl(p.avatar)}" onerror="this.parentNode.textContent='${p.username.slice(0,2).toUpperCase()}'">` : p.username.slice(0,2).toUpperCase()}
          </div>
          <div>
            <div class="player-name">${p.username}</div>
          </div>
        </div>
      </td>
      <td><span class="player-pos" style="color:${pc};border-color:${pc}">${p.mainPos}</span></td>
      <td>${p.games}</td>
      <td><span class="rating-badge" style="background:${rc}">${p.avgRating}</span></td>
      <td style="color:var(--green)">${p.goals}</td>
      <td style="color:var(--accent)">${p.assists}</td>
      <td style="color:var(--gold)">${p.ga}</td>
      <td>${p.tackles}</td>
      <td>${p.saves > 0 ? `<span style="color:var(--gold)">${p.saves}</span>` : '—'}</td>
      <td>${formHtml}</td>
      <td><span class="${trendClass}">${p.trend}</span></td>
    `;
    tbody.appendChild(tr);
  });
}

// ═══════════════════════════════════════════
// CLUB BAR
// ═══════════════════════════════════════════
function renderClubBar() {
  const wins = allMatches.filter(m => m.result === 'W').length;
  const draws = allMatches.filter(m => m.result === 'D').length;
  const losses = allMatches.filter(m => m.result === 'L').length;
  const goals = allMatches.reduce((s,m) => {
    const isHome = m.home_name.trim().toLowerCase() === currentTeam.name.trim().toLowerCase();
    return s + (isHome ? m.home_score : m.away_score);
  }, 0);
  const gc = allMatches.reduce((s,m) => {
    const isHome = m.home_name.trim().toLowerCase() === currentTeam.name.trim().toLowerCase();
    return s + (isHome ? m.away_score : m.home_score);
  }, 0);
  const pct = allMatches.length ? Math.round(wins/allMatches.length*100) : 0;
  const rated = players.filter(p => p.avgRating > 0);
  const avgTeam = rated.length ? (rated.reduce((s,p)=>s+p.avgRating,0)/rated.length).toFixed(2) : '—';

  document.getElementById('clubBar').innerHTML = `
    <div class="cb-stat"><div class="cb-val" style="color:var(--text)">${allMatches.length}</div><div class="cb-label">Matchs</div></div>
    <div class="cb-stat"><div class="cb-val" style="color:var(--green)">${wins}</div><div class="cb-label">Victoires</div></div>
    <div class="cb-stat"><div class="cb-val" style="color:var(--gold)">${draws}</div><div class="cb-label">Nuls</div></div>
    <div class="cb-stat"><div class="cb-val" style="color:var(--red)">${losses}</div><div class="cb-label">Défaites</div></div>
    <div class="cb-stat"><div class="cb-val" style="color:var(--accent)">${pct}%</div><div class="cb-label">% Victoires</div></div>
    <div class="cb-stat"><div class="cb-val" style="color:var(--green)">${goals}</div><div class="cb-label">Buts marqués</div></div>
    <div class="cb-stat"><div class="cb-val" style="color:var(--red)">${gc}</div><div class="cb-label">Buts encaissés</div></div>
    <div class="cb-stat"><div class="cb-val" style="color:var(--gold)">${avgTeam}</div><div class="cb-label">Note collective</div></div>
  `;
}

// ═══════════════════════════════════════════
// MATCHES TAB
// ═══════════════════════════════════════════
function renderMatches() {
  const list = document.getElementById('matchesList');
  const sorted = [...allMatches].sort((a,b) => new Date(b.datetime) - new Date(a.datetime));

  list.innerHTML = sorted.map(m => {
    const rc = m.result === 'W' ? 'var(--green)' : m.result === 'D' ? 'var(--gold)' : 'var(--red)';
    const d = m.datetime ? new Date(m.datetime).toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit',year:'2-digit'}) : '';
    const mData = allMatchData[m.id] || [];
    const myPlayers = mData.filter(p => p.team_id === currentTeam.id && p.match_rating > 0);
    const avg = myPlayers.length ? (myPlayers.reduce((s,p)=>s+p.match_rating,0)/myPlayers.length).toFixed(2) : '—';

    return `<div class="match-card ${m.result}" onclick="openMatchModal(${m.id})">
      <div class="mc-score ${m.result}">${m.score}</div>
      <div class="mc-info">
        <div class="mc-opp">vs ${m.opp}</div>
        <div class="mc-meta">${d}</div>
      </div>
      <div class="mc-rating">${avg}<small>moy.</small></div>
    </div>`;
  }).join('') || '<div class="empty">Aucun match</div>';
}

// ═══════════════════════════════════════════
// CALENDAR TAB
// ═══════════════════════════════════════════
function renderCalendar() {
  const el = document.getElementById('calendarContent');
  if (!allMatches.length) { el.innerHTML = '<div class="empty">Aucun match</div>'; return; }

  const dayMap = {};
  allMatches.forEach(m => {
    if (!m.datetime) return;
    const key = m.datetime.slice(0,10);
    if (!dayMap[key]) dayMap[key] = [];
    dayMap[key].push(m);
  });

  const days = Object.keys(dayMap).sort();
  const dayNames = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const monthNames = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

  const strip = days.map(d => {
    const date = new Date(d + 'T12:00:00');
    const ms = dayMap[d];
    const hasW = ms.some(m=>m.result==='W');
    const hasL = ms.some(m=>m.result==='L');
    const dotColor = hasW ? 'var(--green)' : !hasL ? 'var(--gold)' : 'var(--red)';
    return `<div class="cal-day-btn" data-day="${d}" onclick="calSelectDay('${d}')">
      <div class="cal-day-num">${String(date.getDate()).padStart(2,'0')}</div>
      <div class="cal-day-name">${dayNames[date.getDay()]}</div>
      <div class="cal-day-month">${monthNames[date.getMonth()]}</div>
      <div class="cal-day-dot" style="background:${dotColor}"></div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div style="overflow-x:auto;padding-bottom:6px;scrollbar-width:thin">
      <div style="display:flex;gap:6px;padding:4px 2px" id="calStrip">${strip}</div>
    </div>
    <div style="margin-top:16px">
      <div id="calDate" style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1rem;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)"></div>
      <div id="calMatches" style="display:flex;flex-direction:column;gap:8px"></div>
    </div>`;

  calSelectDay(days[days.length-1]);
}

function calSelectDay(dayKey) {
  document.querySelectorAll('.cal-day-btn').forEach(b => b.classList.toggle('active', b.dataset.day === dayKey));
  const active = document.querySelector(`.cal-day-btn[data-day="${dayKey}"]`);
  if (active) active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});

  const dayMatches = allMatches.filter(m => m.datetime && m.datetime.slice(0,10) === dayKey);
  const date = new Date(dayKey + 'T12:00:00');
  const dayNames = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const monthNames = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

  document.getElementById('calDate').textContent = `${dayNames[date.getDay()]} ${date.getDate()} ${monthNames[date.getMonth()]} ${date.getFullYear()}`;

  const cards = dayMatches.map(m => {
    const rc = m.result==='W'?'var(--green)':m.result==='D'?'var(--gold)':'var(--red)';
    return `<div class="match-card ${m.result}" onclick="openMatchModal(${m.id})" style="border-left-color:${rc}">
      <div class="mc-score ${m.result}">${m.score}</div>
      <div class="mc-info">
        <div class="mc-opp">vs ${m.opp}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('calMatches').innerHTML = cards || '<div class="empty">Aucun match ce jour</div>';
}

// Calendar CSS
const calStyle = document.createElement('style');
calStyle.textContent = `
.cal-day-btn { display:flex;flex-direction:column;align-items:center;gap:2px;min-width:54px;padding:9px 7px 7px;background:var(--card);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;flex-shrink:0; }
.cal-day-btn:hover { background:var(--card2); }
.cal-day-btn.active { background:rgba(0,229,255,.1);border-color:var(--accent); }
.cal-day-num { font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.25rem;line-height:1; }
.cal-day-btn.active .cal-day-num { color:var(--accent); }
.cal-day-name { font-size:.62rem;font-weight:700;color:var(--muted);letter-spacing:.04em;text-transform:uppercase; }
.cal-day-month { font-size:.58rem;color:var(--muted2); }
.cal-day-dot { width:6px;height:6px;border-radius:50%;margin-top:3px; }
`;
document.head.appendChild(calStyle);

// ═══════════════════════════════════════════
// MATCH MODAL
// ═══════════════════════════════════════════
function openMatchModal(matchId) {
  const m = allMatches.find(m => m.id === matchId);
  if (!m) return;
  const mData = allMatchData[matchId] || [];
  const myPlayers = mData.filter(p => p.team_id === currentTeam.id).sort((a,b) => b.match_rating - a.match_rating);

  const d = m.datetime ? new Date(m.datetime).toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit',year:'numeric'}) : '';
  const rc = m.result==='W'?'var(--green)':m.result==='D'?'var(--gold)':'var(--red)';

  document.getElementById('matchModalTitle').innerHTML = `
    <span style="color:${rc}">${m.score}</span> vs ${m.opp}
    <span style="font-size:.75rem;color:var(--muted);font-weight:400;margin-left:8px">${d}</span>`;

  const rows = myPlayers.map(p => {
    const rc2 = ratingColor(p.match_rating);
    const pc = posColor(p.position);
    return `<div class="md-player-row">
      <div class="md-pos" style="color:${pc}">${p.position}</div>
      <div class="md-username">${p.username}</div>
      ${p.goals > 0 ? `<div class="md-stat">⚽<span>${p.goals}</span></div>` : '<div class="md-stat"></div>'}
      ${p.assists > 0 ? `<div class="md-stat">🅰<span>${p.assists}</span></div>` : '<div class="md-stat"></div>'}
      <div class="md-stat" style="color:var(--muted)">Tac<span style="color:var(--text)">${p.tackles_made||0}</span></div>
      ${p.saves > 0 ? `<div class="md-stat">🧤<span>${p.saves}</span></div>` : ''}
      <div class="md-rating" style="background:${rc2}">${p.match_rating > 0 ? p.match_rating : '—'}</div>
    </div>`;
  }).join('');

  document.getElementById('matchModalBody').innerHTML = rows || '<div class="empty">Aucune donnée joueur</div>';
  document.getElementById('matchModal').classList.add('open');
}

function closeMatchModal() {
  document.getElementById('matchModal').classList.remove('open');
}

// ═══════════════════════════════════════════
// PLAYER MODAL
// ═══════════════════════════════════════════
function openPlayerModal(p) {
  document.getElementById('playerModal').scrollTop = 0;
  const pc = posColor(p.mainPos);
  const rc = ratingColor(p.avgRating);

  document.getElementById('pmAvatar').style.background = pc + '33';
  document.getElementById('pmAvatar').innerHTML = p.avatar
    ? `<img src="${logoUrl(p.avatar)}" style="width:100%;height:100%;object-fit:cover;border-radius:8px">`
    : `<span style="color:${pc};font-weight:900;font-family:'Barlow Condensed',sans-serif">${p.username.slice(0,2).toUpperCase()}</span>`;
  document.getElementById('pmName').textContent = p.username;
  document.getElementById('pmMeta').textContent = `${posGroup(p.mainPos)} · ${p.mainPos} · ${p.games} matchs`;

  const gpg = p.games ? (p.goals/p.games).toFixed(2) : 0;
  const apg = p.games ? (p.assists/p.games).toFixed(2) : 0;

  const recentRows = p.recent.map(m => {
    const rc2 = ratingColor(m.rating);
    const d = m.date ? new Date(m.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'}) : '';
    return `<div class="match-item">
      <span class="mi-res ${m.result}">${m.result}</span>
      <span style="flex:1;font-size:.8rem">vs ${m.opp}</span>
      <span style="font-size:.75rem;color:var(--muted)">${m.score}</span>
      ${m.goals > 0 ? `<span style="font-size:.75rem;color:var(--green)">⚽${m.goals}</span>` : ''}
      ${m.assists > 0 ? `<span style="font-size:.75rem;color:var(--accent)">🅰${m.assists}</span>` : ''}
      <span class="md-rating" style="background:${rc2};font-size:.8rem;padding:2px 6px;border-radius:5px">${m.rating > 0 ? m.rating : '—'}</span>
      <span style="font-size:.65rem;color:var(--muted2);margin-left:4px">${d}</span>
    </div>`;
  }).join('');

  document.getElementById('pmTabs').innerHTML = `
    <button class="pm-tab active" onclick="switchPmTab('stats',this)">📊 Stats</button>
    <button class="pm-tab" onclick="switchPmTab('recent',this)">🕐 Matchs</button>
  `;

  document.getElementById('pmPanels').innerHTML = `
    <div class="pm-panel active" id="pm-stats">
      <div class="stat-blocks">
        <div class="sb"><div class="sb-v" style="color:${rc}">${p.avgRating}</div><div class="sb-l">Note moy.</div></div>
        <div class="sb"><div class="sb-v" style="color:var(--green)">${p.goals}</div><div class="sb-l">Buts</div></div>
        <div class="sb"><div class="sb-v" style="color:var(--accent)">${p.assists}</div><div class="sb-l">Passes D.</div></div>
        <div class="sb"><div class="sb-v" style="color:var(--gold)">${p.ga}</div><div class="sb-l">G+A</div></div>
        <div class="sb"><div class="sb-v">${p.tackles}</div><div class="sb-l">Tacles</div></div>
        ${p.saves > 0 ? `<div class="sb"><div class="sb-v" style="color:var(--gold)">${p.saves}</div><div class="sb-l">Arrêts</div></div>` : ''}
        <div class="sb"><div class="sb-v" style="color:var(--green)">${gpg}</div><div class="sb-l">B/match</div></div>
        <div class="sb"><div class="sb-v" style="color:var(--accent)">${apg}</div><div class="sb-l">PD/match</div></div>
        <div class="sb"><div class="sb-v" style="color:var(--green)">${p.wins}</div><div class="sb-l">Victoires</div></div>
        <div class="sb"><div class="sb-v" style="color:var(--red)">${p.losses}</div><div class="sb-l">Défaites</div></div>
      </div>
    </div>
    <div class="pm-panel" id="pm-recent">
      <div>${recentRows || '<div class="empty">Aucun match récent</div>'}</div>
    </div>
  `;

  document.getElementById('playerModal').classList.add('open');
}

function switchPmTab(id, btn) {
  document.querySelectorAll('.pm-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.pm-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pm-' + id)?.classList.add('active');
}

function closePlayerModal() {
  document.getElementById('playerModal').classList.remove('open');
}

// ═══════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'tab-' + tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tab + '-content'));
  document.getElementById('filterBar').style.display = tab === 'classement' ? '' : 'none';
  document.getElementById('clubBar').style.display = tab === 'classement' ? '' : 'none';
  if (tab === 'matches') renderMatches();
  if (tab === 'calendar') renderCalendar();
}

// ═══════════════════════════════════════════
// BACK TO SEARCH
// ═══════════════════════════════════════════
function backToSearch() {
  document.getElementById('trackerScreen').style.display = 'none';
  document.getElementById('searchScreen').style.display = 'flex';
  switchTab('classement');
}

// ═══════════════════════════════════════════
// RECENT TEAMS (localStorage)
// ═══════════════════════════════════════════
function saveRecent(team) {
  try {
    let recent = JSON.parse(localStorage.getItem('vpg_recent') || '[]');
    recent = recent.filter(t => t.name !== team.name || t.league !== team.league);
    recent.unshift({ name: team.name, logo: team.logo, league: team.league });
    recent = recent.slice(0, 5);
    localStorage.setItem('vpg_recent', JSON.stringify(recent));
  } catch(e) {}
  renderRecent();
}

function renderRecent() {
  try {
    const recent = JSON.parse(localStorage.getItem('vpg_recent') || '[]');
    if (!recent.length) return;
    const wrap = document.getElementById('recentTeams');
    wrap.style.display = 'flex';
    document.getElementById('recentList').innerHTML = recent.map(t => `
      <div class="recent-chip" onclick="searchTeam_direct(${JSON.stringify(t).replace(/"/g,'&quot;')})">
        <img src="${logoUrl(t.logo)}" onerror="this.style.display='none'">
        ${t.name}
      </div>
    `).join('');
  } catch(e) {}
}

async function searchTeam_direct(team) {
  document.getElementById('teamSearchInput').value = team.name;
  await selectTeam(team);
}

// ═══════════════════════════════════════════
// CLOSE MODALS ON OVERLAY CLICK
// ═══════════════════════════════════════════
document.getElementById('matchModal').addEventListener('click', e => {
  if (e.target === document.getElementById('matchModal')) closeMatchModal();
});
document.getElementById('playerModal').addEventListener('click', e => {
  if (e.target === document.getElementById('playerModal')) closePlayerModal();
});

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
renderRecent();
</script>

</html>

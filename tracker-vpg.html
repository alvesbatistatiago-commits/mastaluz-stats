<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPG Stats Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080c14; --card:#0d1220; --card2:#111827;
  --border:#1a2035; --border2:#222840;
  --text:#e8eaf6; --muted:#5a6080; --muted2:#3a4060;
  --accent:#00e5ff; --green:#00e564; --red:#ff3250; --gold:#d4aa3c;
  --s1:#00e5ff; --s2:#00e564; --s3:#d4aa3c;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,.012) 2px,rgba(0,229,255,.012) 4px),repeating-linear-gradient(90deg,transparent,transparent 2px,rgba(0,229,255,.008) 2px,rgba(0,229,255,.008) 4px);pointer-events:none;z-index:0}

/* ── LAYOUT ── */
#app{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 16px 60px}

/* ── HEADER ── */
header{display:flex;align-items:center;gap:14px;padding:16px 0 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(8,12,20,.95);backdrop-filter:blur(8px);z-index:100}
.logo-img{width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0}
.logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.3rem;letter-spacing:.08em}
.logo-sub{font-size:.7rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.header-search{flex:1;max-width:320px;margin-left:auto}
.header-search input{width:100%;background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:7px 12px;color:var(--text);font-family:'Barlow',sans-serif;font-size:.85rem;outline:none;transition:border-color .15s}
.header-search input:focus{border-color:var(--accent)}
.header-search input::placeholder{color:var(--muted)}

/* ── MAIN TABS ── */
.main-tabs{display:flex;gap:4px;padding:10px 0;border-bottom:1px solid var(--border);position:sticky;top:72px;background:rgba(8,12,20,.95);backdrop-filter:blur(8px);z-index:99}
.main-tab{background:transparent;border:1px solid transparent;border-radius:8px;padding:8px 20px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.95rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.main-tab:hover{color:var(--text);background:var(--card)}
.main-tab.active{color:var(--accent);border-color:var(--accent);background:rgba(0,229,255,.07)}

/* ── SUB TABS ── */
.sub-tabs{display:flex;gap:2px;padding:8px 0;overflow-x:auto;scrollbar-width:none}
.sub-tabs::-webkit-scrollbar{display:none}
.sub-tab{background:transparent;border:none;border-radius:6px;padding:5px 12px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.8rem;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:all .15s}
.sub-tab:hover{color:var(--text);background:var(--card)}
.sub-tab.active{color:var(--accent);background:rgba(0,229,255,.08)}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);margin-bottom:14px}
.filter-label{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.chip{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.75rem;letter-spacing:.04em;cursor:pointer;color:var(--muted);transition:all .15s}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.active{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,.08)}
.filter-sep{width:1px;height:20px;background:var(--border2);margin:0 4px}

/* ── TABLE ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
thead th{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--text)}
thead th.sorted{color:var(--accent)}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
tbody tr:hover{background:var(--card)}
tbody td{padding:10px;white-space:nowrap}
.rank-cell{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.1rem;color:var(--muted2);width:32px}
.rank-cell.top1{color:var(--gold)} .rank-cell.top2{color:#aaa} .rank-cell.top3{color:#cd7f32}
.player-cell{display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.75rem;flex-shrink:0;font-family:'Barlow Condensed',sans-serif}
.player-name{font-weight:700;font-size:.9rem}
.player-team{font-size:.72rem;color:var(--muted);margin-top:1px}
.pos-badge{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.68rem;padding:2px 5px;border-radius:4px;border:1px solid currentColor}
.rating-badge{display:inline-block;padding:3px 8px;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:.9rem;color:#000}
.trend-up{color:var(--green)} .trend-down{color:var(--red)} .trend-neutral{color:var(--muted)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.trend-alert{animation:blink 1s infinite}

/* ── PAGINATION ── */
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px 0}
.page-btn{background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:6px 14px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;transition:all .15s}
.page-btn:hover{border-color:var(--accent);color:var(--accent)}
.page-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
.page-btn:disabled{opacity:.4;cursor:default}
.page-info{font-size:.8rem;color:var(--muted)}

/* ── TEAM SEARCH ── */
.team-search-wrap{padding:20px 0}
.team-search-box{display:flex;gap:8px;max-width:480px;margin-bottom:16px}
.team-search-box input{flex:1;background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:10px 16px;color:var(--text);font-family:'Barlow',sans-serif;font-size:.95rem;outline:none;transition:border-color .15s}
.team-search-box input:focus{border-color:var(--accent)}
.search-btn{background:var(--accent);color:#000;border:none;border-radius:10px;padding:10px 18px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.95rem;cursor:pointer}
.search-results{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.search-result-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:border-color .15s}
.search-result-item:hover{border-color:var(--accent)}
.sri-avatar{width:38px;height:38px;border-radius:50%;background:var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:.85rem;color:var(--accent);flex-shrink:0}
.sri-name{font-weight:700;font-size:.95rem}
.sri-meta{font-size:.75rem;color:var(--muted);margin-top:2px}

/* ── TEAM VIEW ── */
.team-header{display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:14px}
.team-avatar{width:52px;height:52px;border-radius:50%;background:var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.1rem;color:var(--accent)}
.team-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.6rem;letter-spacing:.06em}
.team-meta{font-size:.78rem;color:var(--muted);margin-top:3px}
.back-btn{background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:6px 14px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;margin-left:auto;transition:all .15s}
.back-btn:hover{color:var(--text);border-color:var(--border)}

/* ── CLUB BAR ── */
.club-bar{display:flex;gap:16px;flex-wrap:wrap;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:14px}
.cb-stat{display:flex;flex-direction:column;gap:2px}
.cb-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.3rem}
.cb-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}

/* ── MATCHES ── */
.match-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--border2);border-radius:10px;padding:12px 16px;margin-bottom:8px;cursor:pointer;transition:background .12s;display:flex;align-items:center;gap:14px}
.match-card:hover{background:var(--card2)}
.match-card.W{border-left-color:var(--green)}
.match-card.D{border-left-color:var(--gold)}
.match-card.L{border-left-color:var(--red)}
.mc-score{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.8rem;min-width:56px;line-height:1}
.mc-score.W{color:var(--green)}.mc-score.D{color:var(--gold)}.mc-score.L{color:var(--red)}
.mc-info{flex:1;min-width:0}
.mc-opp{font-weight:700;font-size:.9rem}
.mc-meta{font-size:.72rem;color:var(--muted);margin-top:2px}
.mc-rating{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.3rem;color:var(--gold);text-align:center}
.mc-rating small{display:block;font-size:.6rem;color:var(--muted);font-weight:400}

/* ── PLAYER MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:14px;width:min(860px,96vw);max-height:90vh;overflow-y:auto;position:relative}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card);z-index:10}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.2rem}
.close-btn{background:var(--card2);border:1px solid var(--border2);border-radius:8px;color:var(--muted);font-size:1rem;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:color .12s;flex-shrink:0}
.close-btn:hover{color:var(--text)}
.pm-tabs{display:flex;gap:4px;padding:10px 22px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.pm-tab{background:transparent;border:1px solid transparent;border-radius:6px;padding:5px 12px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.78rem;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:all .15s}
.pm-tab:hover{color:var(--text)}
.pm-tab.active{color:var(--accent);border-color:var(--accent);background:rgba(0,229,255,.07)}
.pm-panel{display:none;padding:18px 22px}
.pm-panel.active{display:block}
.stat-blocks{display:flex;flex-wrap:wrap;gap:8px}
.sb{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;min-width:70px;text-align:center}
.sb-v{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.3rem}
.sb-l{font-size:.65rem;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.match-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:.8rem}
.match-item:last-child{border-bottom:none}
.mi-res{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:.72rem;width:18px;text-align:center}
.mi-res.W{color:var(--green)}.mi-res.D{color:var(--gold)}.mi-res.L{color:var(--red)}

/* ── LOADING ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:16px;color:var(--muted)}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── EMPTY ── */
.empty{text-align:center;color:var(--muted);padding:40px;font-size:.9rem}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:10px 20px;font-size:.875rem;font-weight:600;z-index:9999;transition:transform .3s ease;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.success{border-color:var(--green);color:var(--green)}
#toast.error{border-color:var(--red);color:var(--red)}

/* ── RECENT TEAMS ── */
.recent-teams{margin-top:20px}
.recent-label{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.recent-list{display:flex;flex-wrap:wrap;gap:6px}
.recent-chip{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:5px 12px 5px 8px;cursor:pointer;font-size:.82rem;font-weight:600;transition:border-color .12s}
.recent-chip:hover{border-color:var(--accent)}

/* ── ARCHETYPE BADGE ── */
.arch-badge{font-size:.68rem;color:var(--muted);font-style:italic}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .main-tab{padding:7px 14px;font-size:.85rem}
  tbody td{padding:8px 6px}
  .modal{border-radius:14px 14px 0 0}
}
</style>
</head>
<body>
<div id="app">

<header>
  <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
    <div style="width:40px;height:40px;border-radius:50%;background:var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;color:var(--accent);font-size:1rem">VPG</div>
    <div>
      <div class="logo-text">VPG STATS</div>
      <div class="logo-sub">Multi-équipes</div>
    </div>
  </div>
  <div class="header-search">
    <input type="text" id="globalSearch" placeholder="🔍 Rechercher joueur ou équipe..." 
      oninput="onGlobalSearch(this.value)"
      onkeydown="if(event.key==='Enter')onGlobalSearchEnter()">
  </div>
</header>

<!-- MAIN TABS -->
<div class="main-tabs">
  <button class="main-tab active" id="mainTab-joueurs" onclick="switchMainTab('joueurs')">👤 Joueurs</button>
  <button class="main-tab" id="mainTab-equipes" onclick="switchMainTab('equipes')">🏟 Équipes</button>
</div>

<!-- ═══ ONGLET JOUEURS ═══ -->
<div id="tabJoueurs" class="tab-content" style="display:block">

  <!-- Sub tabs -->
  <div class="sub-tabs">
    <button class="sub-tab active" id="pTab-classement" onclick="switchPlayerTab('classement')">🏆 Classement</button>
    <button class="sub-tab" id="pTab-matches" onclick="switchPlayerTab('matches')">⚽ Matchs</button>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar" id="playerFilterBar">
    <span class="filter-label">Poste</span>
    <div style="display:flex;gap:4px;flex-wrap:wrap">
      <button class="chip active" data-pos="" onclick="setPlayerFilter('pos','',this)">Tous</button>
      <button class="chip" data-pos="goalkeeper" onclick="setPlayerFilter('pos','goalkeeper',this)">GK</button>
      <button class="chip" data-pos="defender" onclick="setPlayerFilter('pos','defender',this)">DEF</button>
      <button class="chip" data-pos="midfielder" onclick="setPlayerFilter('pos','midfielder',this)">MIL</button>
      <button class="chip" data-pos="forward" onclick="setPlayerFilter('pos','forward',this)">ATT</button>
    </div>
    <div class="filter-sep"></div>
    <span class="filter-label">Archétype</span>
    <select id="archetypeFilter" onchange="setPlayerFilter('archetype',this.value,null)" style="background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:5px 10px;color:var(--text);font-family:'Barlow',sans-serif;font-size:.82rem;outline:none">
      <option value="">Tous</option>
      <option value="8">Maestro</option>
      <option value="9">Créateur</option>
      <option value="7">Récupérateur</option>
      <option value="11">Magicien</option>
      <option value="12">Finisseur</option>
      <option value="3">Facilitateur</option>
      <option value="1">Gardien</option>
      <option value="2">Libéro</option>
      <option value="4">Intercepteur</option>
      <option value="5">Attaquant de surface</option>
      <option value="6">Box-to-box</option>
      <option value="10">Électron libre</option>
    </select>
  </div>

  <!-- Player classement -->
  <div id="pTabClassement">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Joueur</th>
            <th onclick="sortPlayers('pos')">Poste</th>
            <th onclick="sortPlayers('matchCount')" class="sorted">MJ ↓</th>
            <th onclick="sortPlayers('globalRating')">Note</th>
            <th onclick="sortPlayers('totalGoals')">Buts</th>
            <th onclick="sortPlayers('totalAssists')">PD</th>
            <th onclick="sortPlayers('moms')">MOM</th>
            <th onclick="sortPlayers('passSuccess')">Pass%</th>
            <th onclick="sortPlayers('tackleSuccess')">Tac%</th>
            <th>Forme</th>
          </tr>
        </thead>
        <tbody id="playerTableBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="playerPagination"></div>
  </div>

  <!-- Player matches (shown when a player is selected) -->
  <div id="pTabMatches" style="display:none">
    <div id="playerMatchesContent"></div>
  </div>

</div>

<!-- ═══ ONGLET ÉQUIPES ═══ -->
<div id="tabEquipes" class="tab-content" style="display:none">

  <!-- Team search view -->
  <div id="teamSearchView">
    <div class="team-search-wrap">
      <div class="team-search-box">
        <input type="text" id="teamSearchInput" placeholder="Rechercher une équipe ou un joueur..." 
          onkeydown="if(event.key==='Enter')doTeamSearch()">
        <button class="search-btn" onclick="doTeamSearch()">Chercher</button>
      </div>
      <div id="teamSearchStatus" style="font-size:.82rem;color:var(--muted);display:none"></div>
      <div id="teamSearchResults" class="search-results"></div>
      <div class="recent-teams" id="recentTeamsWrap" style="display:none">
        <div class="recent-label">Récemment consultées</div>
        <div class="recent-list" id="recentTeamsList"></div>
      </div>
    </div>
  </div>

  <!-- Team loaded view -->
  <div id="teamLoadedView" style="display:none">
    <!-- Sub tabs for team -->
    <div class="sub-tabs">
      <button class="sub-tab active" id="tTab-classement" onclick="switchTeamTab('classement')">🏆 Joueurs</button>
      <button class="sub-tab" id="tTab-matches" onclick="switchTeamTab('matches')">⚽ Matchs</button>
      <button class="sub-tab" id="tTab-calendar" onclick="switchTeamTab('calendar')">📅 Calendrier</button>
    </div>

    <!-- Team filter bar -->
    <div class="filter-bar" id="teamFilterBar">
      <span class="filter-label">Saison</span>
      <div style="display:flex;gap:4px;flex-wrap:wrap">
        <button class="chip active" onclick="setTeamFilter('season','all',this)">Toutes</button>
        <button class="chip s1" onclick="setTeamFilter('season','S1',this)">S1 FC26</button>
        <button class="chip s2" onclick="setTeamFilter('season','S2',this)">S2 FC26</button>
      </div>
      <div class="filter-sep"></div>
      <span class="filter-label">Compétition</span>
      <div style="display:flex;gap:4px;flex-wrap:wrap">
        <button class="chip active" onclick="setTeamFilter('league','all',this)">Toutes</button>
        <button class="chip" onclick="setTeamFilter('league','FR',this)">🇫🇷 FR</button>
        <button class="chip" onclick="setTeamFilter('league','SWI',this)">🇨🇭 Ascension</button>
        <button class="chip" onclick="setTeamFilter('league','FRIENDLY',this)">🤝 Amical</button>
      </div>
      <div class="filter-sep"></div>
      <span class="filter-label">Min. matchs</span>
      <div style="display:flex;gap:4px;flex-wrap:wrap">
        <button class="chip active" onclick="setTeamFilter('minm','1',this)">≥1</button>
        <button class="chip" onclick="setTeamFilter('minm','3',this)">≥3</button>
        <button class="chip" onclick="setTeamFilter('minm','5',this)">≥5</button>
      </div>
      <button class="back-btn" onclick="backToTeamSearch()">↩ Changer d'équipe</button>
    </div>

    <!-- Club bar -->
    <div class="club-bar" id="teamClubBar"></div>

    <!-- Team classement -->
    <div id="tTabClassement">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Joueur</th>
              <th>Poste</th>
              <th onclick="sortTeamPlayers('games')">MJ</th>
              <th onclick="sortTeamPlayers('avgRating')" class="sorted">Note ↓</th>
              <th onclick="sortTeamPlayers('goals')">Buts</th>
              <th onclick="sortTeamPlayers('assists')">PD</th>
              <th onclick="sortTeamPlayers('ga')">G+A</th>

<!-- Toast -->
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════
// CONFIG & STATE
// ═══════════════════════════════════════════
const CC_API = 'https://api.club-champions.eu/cc';

// Global players state
let globalPlayers = [];
let playerFilters = { pos: '', archetype: '', search: '', page: 1 };
let playerSortKey = 'matchCount';
let playerSortDir = -1;
let playerTotalPages = 1;

// Team state
let teamMatches = []; // built match objects
let teamPlayers = []; // built player objects
let currentTeam = null;
let teamFilters = { season: 'all', league: 'all', minm: '1' };
let teamSortKey = 'avgRating';
let teamSortDir = -1;

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function posColor(pos) {
  if (!pos) return '#00e564';
  const p = (pos || '').toLowerCase();
  if (p === 'goalkeeper' || p === 'gk') return '#d4aa3c';
  if (p === 'defender' || p === 'cb' || p === 'def') return '#00e5ff';
  if (p === 'forward' || p === 'st' || p === 'att') return '#ff6b35';
  return '#00e564';
}

function posShort(pos) {
  if (!pos) return 'MIL';
  const p = pos.toLowerCase();
  if (p === 'goalkeeper') return 'GK';
  if (p === 'defender') return 'DEF';
  if (p === 'midfielder') return 'MIL';
  if (p === 'forward') return 'ATT';
  return pos.toUpperCase().slice(0,3);
}

function ratingColor(r) {
  const n = parseFloat(r);
  if (n >= 8.5) return '#00e564';
  if (n >= 7.5) return '#7bc67e';
  if (n >= 6.5) return '#d4aa3c';
  if (n >= 5.5) return '#ff9800';
  return '#ff3250';
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = type ? `show ${type}` : 'show';
  setTimeout(() => t.className = '', 3000);
}

function ccParseDate(dateStr, timeStr) {
  if (!dateStr) return '';
  const parts = dateStr.split('/');
  if (parts.length !== 3) return '';
  const year = parseInt(parts[2]) + 2000;
  return `${year}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}T${timeStr||'00:00'}:00`;
}

function ccGuessSeason(dateStr) {
  if (!dateStr) return 'S2';
  const parts = dateStr.split('/');
  if (parts.length !== 3) return 'S2';
  const year = parseInt(parts[2]) + 2000;
  const month = parseInt(parts[1]);
  if (year === 2025) return 'S1';
  if (year === 2026 && month <= 1) return 'S1';
  return 'S2';
}

function ccLeagueLabel(slug) {
  if (!slug) return 'FRIENDLY';
  const s = slug.toUpperCase();
  if (s.includes('LIGUE') || s.includes('JUPILER') || s.includes('PRO')) return 'FR';
  if (s.includes('ASCENSION') || s.includes('SWI')) return 'SWI';
  if (s.includes('CUP')) return 'CUP';
  return 'FR';
}

// ═══════════════════════════════════════════
// MAIN TAB SWITCHING
// ═══════════════════════════════════════════
function switchMainTab(tab) {
  document.querySelectorAll('.main-tab').forEach(b => b.classList.toggle('active', b.id === 'mainTab-' + tab));
  document.getElementById('tabJoueurs').style.display = tab === 'joueurs' ? 'block' : 'none';
  document.getElementById('tabEquipes').style.display = tab === 'equipes' ? 'block' : 'none';
}

// ═══════════════════════════════════════════
// ONGLET JOUEURS
// ═══════════════════════════════════════════
function switchPlayerTab(tab) {
  document.querySelectorAll('.sub-tab[id^="pTab-"]').forEach(b => b.classList.toggle('active', b.id === 'pTab-' + tab));
  document.getElementById('pTabClassement').style.display = tab === 'classement' ? 'block' : 'none';
  document.getElementById('pTabMatches').style.display = tab === 'matches' ? 'block' : 'none';
  document.getElementById('playerFilterBar').style.display = tab === 'classement' ? '' : 'none';
}

function setPlayerFilter(key, val, btn) {
  playerFilters[key] = val;
  playerFilters.page = 1;
  if (btn) {
    const group = btn.parentElement;
    group.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
  }
  loadGlobalPlayers();
}

function sortPlayers(key) {
  if (playerSortKey === key) playerSortDir *= -1;
  else { playerSortKey = key; playerSortDir = -1; }
  loadGlobalPlayers();
}

async function loadGlobalPlayers() {
  const tbody = document.getElementById('playerTableBody');
  tbody.innerHTML = `<tr><td colspan="11"><div class="loading"><div class="spinner"></div></div></td></tr>`;

  const params = new URLSearchParams({
    page: playerFilters.page,
    active: 'true',
  });
  if (playerFilters.pos) params.set('role', playerFilters.pos);
  if (playerFilters.archetype) params.set('archetypeId', playerFilters.archetype);
  if (playerFilters.search) params.set('search', playerFilters.search);

  try {
    const res = await fetch(`${CC_API}/player?${params}`);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    globalPlayers = data.data || [];
    playerTotalPages = data.meta?.totalPages || 1;
    renderGlobalPlayers();
    renderPlayerPagination(data.meta);
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="11" class="empty">Erreur de chargement</td></tr>`;
    console.error(e);
  }
}

function renderGlobalPlayers() {
  // Sort locally
  const sorted = [...globalPlayers].sort((a,b) => {
    const av = a[playerSortKey] ?? 0;
    const bv = b[playerSortKey] ?? 0;
    return playerSortDir * (bv > av ? 1 : bv < av ? -1 : 0);
  });

  const tbody = document.getElementById('playerTableBody');
  const offset = (playerFilters.page - 1) * 50;

  tbody.innerHTML = sorted.map((p, i) => {
    const pc = posColor(p.pos);
    const rc = ratingColor(p.globalRating);
    const rank = offset + i + 1;
    const rankClass = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : '';
    const formHtml = (p.lastRatings || []).map(r => {
      const c = ratingColor(r);
      return `<span style="display:inline-block;width:18px;height:18px;border-radius:4px;background:${c}22;border:1px solid ${c};font-size:.55rem;line-height:18px;text-align:center;color:${c};font-weight:900">${r}</span>`;
    }).join('');

    return `<tr onclick="openGlobalPlayerModal(${JSON.stringify(p).replace(/"/g,'&quot;')})">
      <td class="rank-cell ${rankClass}">${rank}</td>
      <td>
        <div class="player-cell">
          <div class="avatar" style="background:${pc}22;color:${pc}">${p.name.slice(0,2).toUpperCase()}</div>
          <div>
            <div class="player-name">${p.name}</div>
            <div class="player-team">${p.teamName || '—'}</div>
          </div>
        </div>
      </td>
      <td><span class="pos-badge" style="color:${pc};border-color:${pc}">${posShort(p.pos)}</span></td>
      <td>${p.matchCount}</td>
      <td><span class="rating-badge" style="background:${rc}">${p.globalRating}</span></td>
      <td style="color:var(--green)">${p.totalGoals}</td>
      <td style="color:var(--accent)">${p.totalAssists}</td>
      <td style="color:var(--gold)">${p.moms}</td>
      <td>${p.passSuccess?.toFixed(1) || '—'}%</td>
      <td>${p.tackleSuccess?.toFixed(1) || '—'}%</td>
      <td>${formHtml}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="11" class="empty">Aucun joueur</td></tr>`;
}

function renderPlayerPagination(meta) {
  if (!meta) return;
  const { page, totalPages } = meta;
  const pag = document.getElementById('playerPagination');
  let html = `<button class="page-btn" ${page<=1?'disabled':''} onclick="goPlayerPage(${page-1})">←</button>`;
  const start = Math.max(1, page-2);
  const end = Math.min(totalPages, page+2);
  for (let p = start; p <= end; p++) {
    html += `<button class="page-btn ${p===page?'active':''}" onclick="goPlayerPage(${p})">${p}</button>`;
  }
  html += `<span class="page-info">/ ${totalPages.toLocaleString()}</span>`;
  html += `<button class="page-btn" ${page>=totalPages?'disabled':''} onclick="goPlayerPage(${page+1})">→</button>`;
  pag.innerHTML = html;
}

function goPlayerPage(p) {
  playerFilters.page = p;
  loadGlobalPlayers();
  window.scrollTo(0, 0);
}

// ═══════════════════════════════════════════
// GLOBAL PLAYER MODAL
// ═══════════════════════════════════════════
let currentGlobalPlayer = null;
let playerMatchHistory = [];

async function openGlobalPlayerModal(p) {
  currentGlobalPlayer = p;
  playerMatchHistory = [];
  const pc = posColor(p.pos);
  const rc = ratingColor(p.globalRating);

  document.getElementById('pmAvatar').style.cssText = `width:42px;height:42px;border-radius:10px;background:${pc}22;color:${pc};display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:.9rem`;
  document.getElementById('pmAvatar').textContent = p.name.slice(0,2).toUpperCase();
  document.getElementById('pmName').textContent = p.name;
  document.getElementById('pmMeta').textContent = `${posShort(p.pos)} · ${p.teamName || '?'} · ${p.matchCount} matchs · ${p.archetypeLabel || ''}`;

  document.getElementById('pmTabs').innerHTML = `
    <button class="pm-tab active" onclick="switchPmTab('stats',this)">📊 Stats</button>
    <button class="pm-tab" onclick="switchPmTab('history',this)">🕐 Historique</button>
  `;

  // Stats panel
  document.getElementById('pmPanels').innerHTML = `
    <div class="pm-panel active" id="pm-stats">
      <div class="stat-blocks">
        <div class="sb"><div class="sb-v" style="color:${rc}">${p.globalRating}</div><div class="sb-l">Note moy.</div></div>
        <div class="sb"><div class="sb-v">${p.matchCount}</div><div class="sb-l">Matchs</div></div>
        <div class="sb"><div class="sb-v" style="color:var(--green)">${p.totalGoals}</div><div class="sb-l">Buts</div></div>
        <div class="sb"><div class="sb-v" style="color:var(--accent)">${p.totalAssists}</div><div class="sb-l">Passes D.</div></div>
        <div class="sb"><div class="sb-v" style="color:var(--gold)">${p.totalGoals+p.totalAssists}</div><div class="sb-l">G+A</div></div>
        <div class="sb"><div class="sb-v" style="color:var(--gold)">${p.moms}</div><div class="sb-l">MOM</div></div>
        <div class="sb"><div class="sb-v">${p.passSuccess?.toFixed(1)||'—'}%</div><div class="sb-l">Pass%</div></div>
        <div class="sb"><div class="sb-v">${p.tackleSuccess?.toFixed(1)||'—'}%</div><div class="sb-l">Tac%</div></div>
        ${p.totalGoalsConceded > 0 ? `<div class="sb"><div class="sb-v" style="color:var(--red)">${p.totalGoalsConceded}</div><div class="sb-l">Enc.</div></div>` : ''}
      </div>
      <div style="margin-top:16px">
        <div style="font-size:.78rem;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em">5 dernières notes</div>
        <div style="display:flex;gap:8px">
          ${(p.lastRatings||[]).map(r => {
            const c = ratingColor(r);
            return `<div style="background:${c};color:#000;border-radius:6px;padding:4px 10px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1rem">${r}</div>`;
          }).join('')}
        </div>
      </div>
    </div>
    <div class="pm-panel" id="pm-history">
      <div class="loading"><div class="spinner"></div><div>Chargement de l'historique...</div></div>
    </div>
  `;

  document.getElementById('playerModal').classList.add('open');
  document.getElementById('playerModal').scrollTop = 0;

  // Load match history
  await loadPlayerMatchHistory(p);
}

async function loadPlayerMatchHistory(p) {
  try {
    const res = await fetch(`${CC_API}/player/${p.id}/matches?archetypeId=${p.archetypeId || 0}&pos=${p.pos || 'midfielder'}`);
    if (!res.ok) throw new Error('API error');
    playerMatchHistory = await res.json();

    const rows = playerMatchHistory.slice(0, 50).map(m => {
      const isHome = String(m.homeTeamId) === String(p.teamId);
      const myScore = isHome ? m.homeGoals : m.awayGoals;
      const oppScore = isHome ? m.awayGoals : m.homeGoals;
      const result = myScore > oppScore ? 'W' : myScore < oppScore ? 'L' : 'D';
      const opp = isHome ? m.awayClub : m.homeClub;
      const rc = ratingColor(m.rating);
      return `<div class="match-item">
        <span class="mi-res ${result}">${result}</span>
        <span style="flex:1;font-size:.8rem">vs ${opp}</span>
        <span style="font-size:.75rem;color:var(--muted)">${myScore}-${oppScore}</span>
        ${m.goals > 0 ? `<span style="font-size:.75rem;color:var(--green)">⚽${m.goals}</span>` : ''}
        ${m.assists > 0 ? `<span style="font-size:.75rem;color:var(--accent)">🅰${m.assists}</span>` : ''}
        ${m.mom ? `<span style="font-size:.75rem;color:var(--gold)">⭐</span>` : ''}
        <span style="background:${rc};color:#000;border-radius:5px;padding:2px 7px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:.82rem">${m.rating || '—'}</span>
        <span style="font-size:.65rem;color:var(--muted2);margin-left:4px">${m.playedDate||''}</span>
      </div>`;
    }).join('');

    const panel = document.getElementById('pm-history');
    if (panel) {
      panel.innerHTML = rows || '<div class="empty">Aucun match disponible</div>';
    }
  } catch(e) {
    const panel = document.getElementById('pm-history');
    if (panel) panel.innerHTML = '<div class="empty">Erreur de chargement</div>';
  }
}

function switchPmTab(id, btn) {
  document.querySelectorAll('.pm-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.pm-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pm-' + id)?.classList.add('active');
}

function closePlayerModal() {
  document.getElementById('playerModal').classList.remove('open');
}

document.getElementById('playerModal').addEventListener('click', e => {
  if (e.target === document.getElementById('playerModal')) closePlayerModal();
});

// ═══════════════════════════════════════════
// ONGLET ÉQUIPES — SEARCH
// ═══════════════════════════════════════════
function switchTeamTab(tab) {
  document.querySelectorAll('.sub-tab[id^="tTab-"]').forEach(b => b.classList.toggle('active', b.id === 'tTab-' + tab));
  document.getElementById('tTabClassement').style.display = tab === 'classement' ? 'block' : 'none';
  document.getElementById('tTabMatches').style.display = tab === 'matches' ? 'block' : 'none';
  document.getElementById('tTabCalendar').style.display = tab === 'calendar' ? 'block' : 'none';
  if (tab === 'matches') renderTeamMatches();
  if (tab === 'calendar') renderTeamCalendar();
}

async function doTeamSearch() {
  const q = document.getElementById('teamSearchInput').value.trim();
  if (!q) return;
  const status = document.getElementById('teamSearchStatus');
  const results = document.getElementById('teamSearchResults');
  status.textContent = 'Recherche en cours...';
  status.style.display = 'block';
  results.innerHTML = '';

  try {
    const res = await fetch(`${CC_API}/player?search=${encodeURIComponent(q)}&page=1&active=true`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    const players = data.data || [];
    if (!players.length) { status.textContent = 'Aucun résultat.'; return; }

    // Unique teams
    const teamMap = new Map();
    players.forEach(p => {
      if (!p.teamName || !p.teamId) return;
      const key = String(p.teamId);
      if (!teamMap.has(key)) teamMap.set(key, { teamId: key, teamName: p.teamName.trim() });
    });

    status.style.display = 'none';
    results.innerHTML = [...teamMap.values()].map(t => `
      <div class="search-result-item" onclick="loadTeam(${JSON.stringify(t).replace(/"/g,'&quot;')})">
        <div class="sri-avatar">${t.teamName.slice(0,2).toUpperCase()}</div>
        <div>
          <div class="sri-name">${t.teamName}</div>
          <div class="sri-meta">Team ID: ${t.teamId} · Cliquer pour charger</div>
        </div>
      </div>`).join('') +
      `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
        <div style="font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Joueurs correspondants</div>
        ${players.slice(0,8).map(p => {
          const team = { teamId: String(p.teamId), teamName: p.teamName?.trim() || '?' };
          const pc = posColor(p.pos);
          return `<div class="search-result-item" onclick="loadTeam(${JSON.stringify(team).replace(/"/g,'&quot;')})">
            <div class="sri-avatar" style="background:${pc}22;color:${pc}">${p.name.slice(0,2).toUpperCase()}</div>
            <div>
              <div class="sri-name">${p.name} <span style="color:var(--muted);font-weight:400;font-size:.8rem">→ ${p.teamName}</span></div>
              <div class="sri-meta">${p.matchCount} matchs · ${p.globalRating} moy.</div>
            </div>
          </div>`;
        }).join('')}
      </div>`;
  } catch(e) {
    status.textContent = 'Erreur de connexion.';
    status.style.display = 'block';
  }
}

async function loadTeam(team) {
  document.getElementById('teamSearchView').style.display = 'none';
  document.getElementById('teamLoadedView').style.display = 'block';
  currentTeam = team;
  saveRecentTeam(team);

  // Reset
  teamMatches = [];
  teamPlayers = [];
  document.getElementById('teamTableBody').innerHTML = `<tr><td colspan="11"><div class="loading"><div class="spinner"></div><div>Chargement des joueurs...</div></div></td></tr>`;
  document.getElementById('teamClubBar').innerHTML = '';

  showToast('⏳ Chargement de l\'équipe...', '');

  try {
    // Find all players of this team
    let players = [];
    const res = await fetch(`${CC_API}/player?search=${encodeURIComponent(team.teamName)}&page=1&active=true`);
    if (res.ok) {
      const data = await res.json();
      players = (data.data || []).filter(p => String(p.teamId) === String(team.teamId));
    }

    // Also search page 2 if needed
    if (players.length < 5) {
      const res2 = await fetch(`${CC_API}/player?search=${encodeURIComponent(team.teamName)}&page=2&active=true`);
      if (res2.ok) {
        const data2 = await res2.json();
        const more = (data2.data || []).filter(p => String(p.teamId) === String(team.teamId));
        const ids = new Set(players.map(p => p.id));
        more.forEach(p => { if (!ids.has(p.id)) players.push(p); });
      }
    }

    if (!players.length) {
      showToast('Aucun joueur trouvé', 'error');
      backToTeamSearch();
      return;
    }

    showToast(`⏳ ${players.length} joueurs — chargement des matchs...`, '');

    // Fetch match history per player
    const allMatchData = {};
    const batchSize = 5;
    for (let i = 0; i < players.length; i += batchSize) {
      const batch = players.slice(i, i+batchSize);
      await Promise.all(batch.map(async p => {
        try {
          const r = await fetch(`${CC_API}/player/${p.id}/matches?archetypeId=${p.archetypeId||0}&pos=${p.pos||'midfielder'}`);
          if (r.ok) allMatchData[p.id] = await r.json();
        } catch(e) {}
      }));
    }

    // Build match objects
    const matchMap = new Map();
    players.forEach(p => {
      (allMatchData[p.id] || []).forEach(m => {
        if (!m.isFinished || m.hasVproAttr === 0) return;
        const key = m.externalId;
        const isHome = String(m.homeTeamId) === String(team.teamId);
        const myScore = isHome ? m.homeGoals : m.awayGoals;
        const oppScore = isHome ? m.awayGoals : m.homeGoals;
        const result = myScore > oppScore ? 'W' : myScore < oppScore ? 'L' : 'D';
        const opp = (isHome ? m.awayClub : m.homeClub)?.trim() || '?';
        const league = ccLeagueLabel(m.ccLeagueSlug);
        const season = ccGuessSeason(m.playedDate);

        if (!matchMap.has(key)) {
          matchMap.set(key, {
            matchId: `cc_${key}`,
            date: ccParseDate(m.playedDate, m.playedTime),
            opp, score: `${myScore}-${oppScore}`, result, league, season, players: []
          });
        }
        matchMap.get(key).players.push({
          username: p.name,
          match_rating: m.rating || 0,
          goals: m.goals || 0,
          assists: m.assists || 0,
          saves: m.saves || 0,
          position: posShort(m.pos || p.pos),
          man_of_match: m.mom === 1,
        });
      });
    });

    teamMatches = [...matchMap.values()].sort((a,b) => new Date(b.date)-new Date(a.date));

    // Build player aggregates
    buildTeamPlayers(players, allMatchData);
    renderTeamView();
    showToast(`✓ ${team.teamName} — ${teamMatches.length} matchs`, 'success');

  } catch(e) {
    console.error(e);
    showToast('Erreur chargement', 'error');
    backToTeamSearch();
  }
}

function buildTeamPlayers(ccPlayers, allMatchData) {
  teamPlayers = ccPlayers.map(p => {
    const pMatches = (allMatchData[p.id] || []).filter(m => m.isFinished && m.hasVproAttr !== 0);
    const filtered = getFilteredTeamMatches();
    const matchIds = new Set(filtered.map(m => m.matchId.replace('cc_','')));

    let games=0, goals=0, assists=0, saves=0, ratings=[], wins=0, draws=0, losses=0, moms=0;
    pMatches.forEach(m => {
      if (!matchIds.has(m.externalId)) return;
      games++;
      goals += m.goals||0;
      assists += m.assists||0;
      saves += m.saves||0;
      if (m.rating > 0) ratings.push(m.rating);
      if (m.mom === 1) moms++;
      const isHome = String(m.homeTeamId) === String(currentTeam.teamId);
      const ms = isHome ? m.homeGoals : m.awayGoals;
      const os = isHome ? m.awayGoals : m.homeGoals;
      if (ms > os) wins++; else if (ms < os) losses++; else draws++;
    });

    const avgRating = ratings.length ? Math.round((ratings.reduce((s,r)=>s+r,0)/ratings.length)*10)/10 : 0;
    const last5 = ratings.slice(-5);
    const prev5 = ratings.slice(-10,-5);
    let trend = '→';
    if (last5.length >= 3 && prev5.length >= 3) {
      const a = last5.reduce((s,r)=>s+r,0)/last5.length;
      const b = prev5.reduce((s,r)=>s+r,0)/prev5.length;
      if (a-b > 0.3) trend = '↑'; else if (b-a > 0.3) trend = '↓';
    }

    return {
      username: p.name, mainPos: posShort(p.pos),
      games, goals, assists, ga: goals+assists, saves, moms,
      avgRating, ratings, wins, draws, losses, trend,
      ccPlayer: p
    };
  }).filter(p => p.games > 0);
}

function getFilteredTeamMatches() {
  return teamMatches.filter(m => {
    if (teamFilters.season !== 'all' && m.season !== teamFilters.season) return false;
    if (teamFilters.league !== 'all' && m.league !== teamFilters.league) return false;
    if (parseInt(teamFilters.minm) > 1) {
      // Will be applied per player
    }
    return true;
  });
}

function setTeamFilter(key, val, btn) {
  teamFilters[key] = val;
  if (btn) {
    btn.closest('div').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
  }
  buildTeamPlayers(
    teamPlayers.map(p => p.ccPlayer),
    Object.fromEntries(teamPlayers.map(p => [p.ccPlayer.id, []]))
  );
  // Rebuild properly — re-fetch not needed, just re-filter
  renderTeamTable();
  renderTeamClubBar();
}

function sortTeamPlayers(key) {
  if (teamSortKey === key) teamSortDir *= -1;
  else { teamSortKey = key; teamSortDir = -1; }
  renderTeamTable();
}

function renderTeamView() {
  renderTeamClubBar();
  renderTeamTable();
}

function renderTeamClubBar() {
  const filtered = getFilteredTeamMatches();
  const wins = filtered.filter(m=>m.result==='W').length;
  const draws = filtered.filter(m=>m.result==='D').length;
  const losses = filtered.filter(m=>m.result==='L').length;
  const pct = filtered.length ? Math.round(wins/filtered.length*100) : 0;
  const goals = filtered.reduce((s,m)=>{
    const parts = m.score.split('-');
    return s + parseInt(parts[0]||0);
  },0);
  const gc = filtered.reduce((s,m)=>{
    const parts = m.score.split('-');
    return s + parseInt(parts[1]||0);
  },0);

  document.getElementById('teamClubBar').innerHTML = `
    <div class="cb-stat"><div class="cb-val">${currentTeam?.teamName||'—'}</div><div class="cb-label">Équipe</div></div>
    <div class="cb-stat"><div class="cb-val">${filtered.length}</div><div class="cb-label">Matchs</div></div>
    <div class="cb-stat"><div class="cb-val" style="color:var(--green)">${wins}</div><div class="cb-label">Victoires</div></div>
    <div class="cb-stat"><div class="cb-val" style="color:var(--gold)">${draws}</div><div class="cb-label">Nuls</div></div>
    <div class="cb-stat"><div class="cb-val" style="color:var(--red)">${losses}</div><div class="cb-label">Défaites</div></div>
    <div class="cb-stat"><div class="cb-val" style="color:var(--accent)">${pct}%</div><div class="cb-label">% Victoires</div></div>
    <div class="cb-stat"><div class="cb-val" style="color:var(--green)">${goals}</div><div class="cb-label">Buts marqués</div></div>
    <div class="cb-stat"><div class="cb-val" style="color:var(--red)">${gc}</div><div class="cb-label">Encaissés</div></div>
  `;
}

function renderTeamTable() {
  const minm = parseInt(teamFilters.minm) || 1;
  const filtered = teamPlayers.filter(p => p.games >= minm);
  const sorted = [...filtered].sort((a,b) => {
    const av = a[teamSortKey]??0, bv = b[teamSortKey]??0;
    return teamSortDir * (bv>av?1:bv<av?-1:0);
  });

  const tbody = document.getElementById('teamTableBody');
  tbody.innerHTML = sorted.map((p,i) => {
    const pc = posColor(p.mainPos);
    const rc = ratingColor(p.avgRating);
    const trendClass = p.trend==='↑'?'trend-up':p.trend==='↓'?'trend-down':'trend-neutral';
    const formHtml = p.ratings.slice(-5).map(r => {
      const c = ratingColor(r);
      return `<span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:${c}33;border:1px solid ${c};font-size:.5rem;line-height:14px;text-align:center;color:${c};font-weight:900">${r}</span>`;
    }).join('');

    return `<tr onclick="openGlobalPlayerModal(${JSON.stringify(p.ccPlayer).replace(/"/g,'&quot;')})">
      <td class="rank-cell ${i===0?'top1':i===1?'top2':i===2?'top3':''}">${i+1}</td>
      <td><div class="player-cell">
        <div class="avatar" style="background:${pc}22;color:${pc}">${p.username.slice(0,2).toUpperCase()}</div>
        <div class="player-name">${p.username}</div>
      </div></td>
      <td><span class="pos-badge" style="color:${pc};border-color:${pc}">${p.mainPos}</span></td>
      <td>${p.games}</td>
      <td><span class="rating-badge" style="background:${rc}">${p.avgRating}</span></td>
      <td style="color:var(--green)">${p.goals}</td>
      <td style="color:var(--accent)">${p.assists}</td>
      <td style="color:var(--gold)">${p.ga}</td>
      <td>${p.saves>0?`<span style="color:var(--gold)">${p.saves}</span>`:'—'}</td>
      <td>${formHtml}</td>
      <td><span class="${trendClass}">${p.trend}</span></td>
    </tr>`;
  }).join('') || `<tr><td colspan="11" class="empty">Aucun joueur avec ≥${minm} match(s)</td></tr>`;
}

function renderTeamMatches() {
  const filtered = getFilteredTeamMatches();
  document.getElementById('teamMatchesList').innerHTML = filtered.map(m => {
    const rc = m.result==='W'?'var(--green)':m.result==='D'?'var(--gold)':'var(--red)';
    const d = m.date ? new Date(m.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'2-digit'}) : '';
    const ratedPlayers = m.players.filter(p=>p.match_rating>0);
    const avg = ratedPlayers.length ? (ratedPlayers.reduce((s,p)=>s+p.match_rating,0)/ratedPlayers.length).toFixed(2) : '—';
    return `<div class="match-card ${m.result}">
      <div class="mc-score ${m.result}">${m.score}</div>
      <div class="mc-info">
        <div class="mc-opp">vs ${m.opp}</div>
        <div class="mc-meta">${d} · ${m.league}</div>
      </div>
      <div class="mc-rating">${avg}<small>moy.</small></div>
    </div>`;
  }).join('') || '<div class="empty">Aucun match</div>';
}

function renderTeamCalendar() {
  const filtered = getFilteredTeamMatches();
  const dayMap = {};
  filtered.forEach(m => {
    if (!m.date) return;
    const key = m.date.slice(0,10);
    if (!dayMap[key]) dayMap[key] = [];
    dayMap[key].push(m);
  });
  const days = Object.keys(dayMap).sort();
  if (!days.length) { document.getElementById('teamCalendarContent').innerHTML = '<div class="empty">Aucun match</div>'; return; }

  const dayNames = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const monthNames = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

  const strip = days.map(d => {
    const date = new Date(d+'T12:00:00');
    const ms = dayMap[d];
    const hasW = ms.some(m=>m.result==='W');
    const hasL = ms.some(m=>m.result==='L');
    const dot = hasW?'var(--green)':!hasL?'var(--gold)':'var(--red)';
    return `<div class="cal-day-btn" data-day="${d}" onclick="calSelectTeamDay('${d}')">
      <div class="cal-day-num">${String(date.getDate()).padStart(2,'0')}</div>
      <div class="cal-day-name">${dayNames[date.getDay()]}</div>
      <div class="cal-day-month">${monthNames[date.getMonth()]}</div>
      <div class="cal-day-dot" style="background:${dot}"></div>
    </div>`;
  }).join('');

  document.getElementById('teamCalendarContent').innerHTML = `
    <div style="overflow-x:auto;padding-bottom:6px">
      <div style="display:flex;gap:6px;padding:4px 2px" id="teamCalStrip">${strip}</div>
    </div>
    <div style="margin-top:16px">
      <div id="teamCalDate" style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1rem;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)"></div>
      <div id="teamCalMatches" style="display:flex;flex-direction:column;gap:8px"></div>
    </div>`;

  calSelectTeamDay(days[days.length-1]);
}

function calSelectTeamDay(dayKey) {
  document.querySelectorAll('#teamCalStrip .cal-day-btn').forEach(b => b.classList.toggle('active', b.dataset.day===dayKey));
  const active = document.querySelector(`#teamCalStrip .cal-day-btn[data-day="${dayKey}"]`);
  if (active) active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});

  const date = new Date(dayKey+'T12:00:00');
  const dayNames = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const monthNames = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  document.getElementById('teamCalDate').textContent = `${dayNames[date.getDay()]} ${date.getDate()} ${monthNames[date.getMonth()]} ${date.getFullYear()}`;

  const filtered = getFilteredTeamMatches();
  const dayMatches = filtered.filter(m => m.date && m.date.slice(0,10) === dayKey);
  const rc_map = {W:'var(--green)',D:'var(--gold)',L:'var(--red)'};

  document.getElementById('teamCalMatches').innerHTML = dayMatches.map(m => `
    <div class="match-card ${m.result}">
      <div class="mc-score ${m.result}">${m.score}</div>
      <div class="mc-info">
        <div class="mc-opp">vs ${m.opp}</div>
        <div class="mc-meta">${m.league}</div>
      </div>
    </div>`).join('') || '<div class="empty">Aucun match ce jour</div>';
}

function backToTeamSearch() {
  document.getElementById('teamSearchView').style.display = 'block';
  document.getElementById('teamLoadedView').style.display = 'none';
  currentTeam = null;
  renderRecentTeams();
}

// ═══════════════════════════════════════════
// GLOBAL SEARCH (header)
// ═══════════════════════════════════════════
let searchTimeout;
function onGlobalSearch(val) {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    playerFilters.search = val;
    playerFilters.page = 1;
    if (document.getElementById('tabJoueurs').style.display !== 'none') {
      loadGlobalPlayers();
    }
  }, 400);
}
function onGlobalSearchEnter() {
  const val = document.getElementById('globalSearch').value.trim();
  if (val) {
    switchMainTab('joueurs');
    playerFilters.search = val;
    playerFilters.page = 1;
    loadGlobalPlayers();
  }
}

// RECENT TEAMS
// ═══════════════════════════════════════════
function saveRecentTeam(team) {
  try {
    let r = JSON.parse(localStorage.getItem('cc_recent') || '[]');
    r = r.filter(t => t.teamId !== team.teamId);
    r.unshift(team);
    r = r.slice(0, 5);
    localStorage.setItem('cc_recent', JSON.stringify(r));
  } catch(e) {}
  renderRecentTeams();
}

function renderRecentTeams() {
  try {
    const r = JSON.parse(localStorage.getItem('cc_recent') || '[]');
    const wrap = document.getElementById('recentTeamsWrap');
    const list = document.getElementById('recentTeamsList');
    if (!r.length) { wrap.style.display='none'; return; }
    wrap.style.display = 'block';
    list.innerHTML = r.map(t => `
      <div class="recent-chip" onclick="loadTeam(${JSON.stringify(t).replace(/"/g,'&quot;')})">
        <span style="font-family:'Barlow Condensed',sans-serif;font-weight:900;color:var(--accent);font-size:.8rem">${t.teamName.slice(0,2).toUpperCase()}</span>
        ${t.teamName}
      </div>`).join('');
  } catch(e) {}
}
